<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- GitHub-styled rounded square card -->
  <rect x="0" y="0" width="128" height="128" rx="24" ry="24" fill="#1f2328"/>

  <!-- subtle inner highlight strip (suggests a railway track horizon) -->
  <rect x="8" y="100" width="112" height="2" fill="#30363d"/>
  <rect x="8" y="106" width="112" height="2" fill="#30363d"/>

  <!-- steam puff (white, GitHub-y soft blob) -->
  <g fill="#ffffff">
    <circle cx="36" cy="30" r="7"/>
    <circle cx="28" cy="36" r="6"/>
    <circle cx="42" cy="38" r="5"/>
    <circle cx="34" cy="42" r="6"/>
  </g>

  <!-- locomotive body (side view) -->
  <g fill="#ffffff">
    <!-- main boiler (cylinder front of train, drawn as rounded rect) -->
    <rect x="20" y="56" width="60" height="32" rx="4" ry="4"/>

    <!-- cab (engineer's cabin, taller block at back) -->
    <rect x="76" y="40" width="32" height="48" rx="3" ry="3"/>

    <!-- smokestack on top of boiler -->
    <rect x="32" y="40" width="14" height="18" rx="2" ry="2"/>
    <!-- smokestack flared top -->
    <rect x="28" y="38" width="22" height="6" rx="2" ry="2"/>

    <!-- cab window (cut out via fill color matching background) -->
  </g>

  <!-- cab window — GitHub accent blue -->
  <rect x="82" y="48" width="20" height="14" rx="2" ry="2" fill="#0969da"/>

  <!-- headlight (front of boiler) — GitHub accent blue, glowing -->
  <circle cx="24" cy="72" r="5" fill="#58a6ff"/>
  <circle cx="24" cy="72" r="2.5" fill="#ffffff"/>

  <!-- cow-catcher / pilot at the front (small angled wedge) -->
  <polygon points="14,88 24,88 20,98" fill="#ffffff"/>

  <!-- wheels: two big driver wheels + one trailing wheel -->
  <g>
    <!-- big driver wheel #1 -->
    <circle cx="36" cy="96" r="12" fill="#ffffff"/>
    <circle cx="36" cy="96" r="6" fill="#1f2328"/>
    <circle cx="36" cy="96" r="2" fill="#ffffff"/>

    <!-- big driver wheel #2 -->
    <circle cx="64" cy="96" r="12" fill="#ffffff"/>
    <circle cx="64" cy="96" r="6" fill="#1f2328"/>
    <circle cx="64" cy="96" r="2" fill="#ffffff"/>

    <!-- trailing wheel under the cab -->
    <circle cx="92" cy="98" r="9" fill="#ffffff"/>
    <circle cx="92" cy="98" r="4" fill="#1f2328"/>
  </g>

  <!-- connecting rod between driver wheels (mechanical detail) -->
  <rect x="32" y="93" width="36" height="3" fill="#1f2328"/>
</svg>
